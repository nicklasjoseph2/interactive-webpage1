<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Web Page</title>

    <!-- CSS (same folder, no css/ needed) -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 id="welcomeMessage">Welcome!</h1>

    <button onclick="showImage()">Show Image</button>
    <button onclick="hideImage()">Hide Image</button>

    <br><br>

    <img id="myImage" src="https://via.placeholder.com/300" alt="Image">

    <p>
        <a href="#" onmouseover="showAlert()">Hover over me!</a>
    </p>

    <!-- JavaScript (same folder, no js/ needed) -->
    <script src="script.js"></script>
</body>
</html>
